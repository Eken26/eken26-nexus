<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Eken26 Pi Login</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h2>Eken26 Pi Verification</h2>
  <button id="pi-login">Sign in with Pi</button>

  <script>
    Pi.init({ version: "2.0", sandbox: true });

    document.getElementById("pi-login").addEventListener("click", async function () {
      try {
        await Pi.authenticate(["username"], function(payment) {});
        document.body.innerHTML = "<h2>Pi Login Success</h2>";
      } catch (e) {
        console.log(e);
      }
    });
  </script>
</body>
</html>
