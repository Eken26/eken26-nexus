<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pi Verify</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<h2>Pi Authentication Test</h2>
<button onclick="loginWithPi()">Sign in with Pi</button>
<div id="result">Ready</div>

<script>
Pi.init({ version: "2.0", sandbox: true });

async function loginWithPi() {
  try {
    document.getElementById("result").innerText = "Signing in...";
    const auth = await Pi.authenticate(
      ["username"],
      function(payment) {},
      function(cancelledPayment) {}
    );
    document.getElementById("result").innerText =
      "SUCCESS: " + auth.user.username;
  } catch (e) {
    document.getElementById("result").innerText =
      "ERROR: " + e.message;
    console.error(e);
  }
}
</script>

</body>
</html>
